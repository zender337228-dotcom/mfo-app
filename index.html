<!DOCTYPE html>
<html lang="ru">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Займы онлайн</title>
    <!-- Подключаем шрифт Telegram (San Francisco) -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--tg-theme-bg-color, #ffffff);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 16px;
            color: var(--tg-theme-text-color, #000000);
        }

        /* Контейнер сетки */
        .container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 20px;
        }

        /* Карточка МФО */
        .offer-card {
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.1s ease;
            border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
        }
        
        .offer-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        /* Заглушка для логотипа */
        .logo-placeholder {
            width: 48px;
            height: 48px;
            background: var(--tg-theme-button-color, #3390ec);
            border-radius: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            color: white;
            flex-shrink: 0;
        }

        .text h3 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .text p {
            font-size: 13px;
            color: var(--tg-theme-hint-color, #8e8e93);
        }

        .apply-btn {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }
        
        .apply-btn:active {
            opacity: 0.7;
        }

        /* Шапка приложения */
        .header {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 4px;
        }
        
        .badge {
            background-color: rgba(50, 144, 236, 0.2);
            color: var(--tg-theme-button-color, #3390ec);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="container">

            logoText: "ПС"
        }
        
    ];

    
    function renderOffers() {
        const container = document.getElementById('offers-list');
        if (!container) return;
        
        let html = '';
        for (let i = 0; i < offers.length; i++) {
            const item = offers[i];
            html += `
                <div class="offer-card" data-url="${item.url}">
                    <div class="offer-info">
                        <div class="logo-placeholder">${item.logoText}</div>
                        <div class="text">
                            <h3>${item.name}</h3>
                            <p>${item.description}</p>
                        </div>
                    </div>
                    <button class="apply-btn" data-index="${i}">Оформить</button>
                </div>
            `;
        }
        container.innerHTML = html;

        // Добавляем обработчики на кнопки
        const buttons = document.querySelectorAll('.apply-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const index = btn.getAttribute('data-index');
                if (index !== null && offers[index]) {
                    const url = offers[index].url;
                    // Открываем ссылку встроенным браузером Telegram
                    // Важно: Telegram автоматически определяет, какой это тип ссылки
                    window.location.href = url;
                }
            });
        });
    }

    // Запускаем отрисовку, когда страница загрузится
    renderOffers();
</script>
